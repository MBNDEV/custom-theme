name: Build & Deploy MBN Theme

on:
  push:
    branches:
      - develop
      - master
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to ${{ matrix.environment_name }}
    runs-on: ubuntu-latest
    concurrency:
      group: deploy-${{ matrix.environment_name }}
      cancel-in-progress: false
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - branch: develop
            environment_name: Staging
            theme_dir_var: WP_STG_THEME_DIR
          - branch: master
            environment_name: Production
            theme_dir_var: WP_PROD_THEME_DIR
    environment:
      name: ${{ matrix.environment_name }}

    steps:
      - name: Checkout code
        if: ${{ matrix.branch == github.ref_name }}
        uses: actions/checkout@v4
      - name: Test SSH connection
        if: ${{ matrix.branch == github.ref_name }}
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ vars.DO_HOST }}
          username: ${{ vars.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ vars.DO_SSH_PORT }}
          script_stop: true
          script: |
            echo "✅ SSH connection successful"
            echo "  Host: $(hostname)"
            echo "  User: $(whoami)"
            echo "  Shell: $SHELL"

      - name: Set up Node.js
        if: ${{ matrix.branch == github.ref_name }}
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Set up PHP
        if: ${{ matrix.branch == github.ref_name }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          tools: composer
          coverage: none

      - name: Install Node dependencies
        if: ${{ matrix.branch == github.ref_name }}
        run: npm ci

      - name: Build theme assets
        if: ${{ matrix.branch == github.ref_name }}
        run: npm run build

      - name: Install Composer dependencies (production only)
        if: ${{ matrix.branch == github.ref_name }}
        run: composer install --no-dev --optimize-autoloader --no-progress --prefer-dist

      - name: Create deployment package
        if: ${{ matrix.branch == github.ref_name }}
        run: |
          mkdir -p deploy-package
          rsync -av \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.gitignore' \
            --exclude='deploy-package' \
            --exclude='resources/css' \
            --exclude='/blocks' \
            --exclude='*.log' \
            --exclude='.DS_Store' \
            --exclude='npm-debug.log*' \
            --exclude='.env' \
            --exclude='.env.local' \
            --exclude='composer.lock' \
            --exclude='package-lock.json' \
            --exclude='phpcs.xml' \
            --exclude='bs-config.js' \
            --exclude='webpack.config.js' \
            --exclude='postcss.config.js' \
            --exclude='tailwind.config.js' \
            --exclude='references' \
            ./ deploy-package/

      - name: Create deployment tarball
        if: ${{ matrix.branch == github.ref_name }}
        run: tar -czf theme-deploy.tar.gz -C deploy-package .

      - name: Set environment variables
        if: ${{ matrix.branch == github.ref_name }}
        id: set-env
        run: |
          echo "REMOTE_THEME_DIR=${{ vars[matrix.theme_dir_var] }}" >> $GITHUB_OUTPUT
          echo "BRANCH=${{ matrix.branch }}" >> $GITHUB_OUTPUT
          echo "GITHUB_SHA=${{ github.sha }}" >> $GITHUB_OUTPUT
          echo "TIMESTAMP=$(date +%Y%m%d-%H%M%S)" >> $GITHUB_OUTPUT
      - name: Upload theme tarball to server
        if: ${{ matrix.branch == github.ref_name }}
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ vars.DO_HOST }}
          username: ${{ vars.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ vars.DO_SSH_PORT }}
          source: theme-deploy.tar.gz
          target: /tmp/

      - name: Extract and verify deployment via SSH
        if: ${{ matrix.branch == github.ref_name }}
        uses: appleboy/ssh-action@v1.2.0
        env:
          REMOTE_THEME_DIR: ${{ steps.set-env.outputs.REMOTE_THEME_DIR }}
          BRANCH: ${{ steps.set-env.outputs.BRANCH }}
          GITHUB_SHA: ${{ steps.set-env.outputs.GITHUB_SHA }}
          TIMESTAMP: ${{ steps.set-env.outputs.TIMESTAMP }}
        with:
          host: ${{ vars.DO_HOST }}
          username: ${{ vars.DO_SSH_USER }}
          key: ${{ secrets.DO_SSH_KEY }}
          port: ${{ vars.DO_SSH_PORT }}
          script_stop: true
          envs: REMOTE_THEME_DIR,BRANCH,GITHUB_SHA,TIMESTAMP
          script: |
            #!/bin/bash
            set -eo pipefail

            echo "==================================="
            echo "Theme Deployment"
            echo "==================================="
            echo "Branch: $BRANCH"
            echo "Commit: $GITHUB_SHA"
            echo "Timestamp: $TIMESTAMP"
            echo "Theme Directory: $REMOTE_THEME_DIR"
            echo ""

            if [ -z "$REMOTE_THEME_DIR" ]; then
              echo "❌ Remote theme directory variable is not configured" >&2
              exit 1
            fi

            if [ ! -d "$REMOTE_THEME_DIR" ]; then
              echo "📁 Theme directory does not exist, creating: $REMOTE_THEME_DIR"
              mkdir -p "$REMOTE_THEME_DIR"
              echo "✅ Directory created"
            fi

            echo "Extracting theme archive..."
            tar -xzf /tmp/theme-deploy.tar.gz -C "$REMOTE_THEME_DIR"
            rm -f /tmp/theme-deploy.tar.gz
            echo "✅ Archive extracted"

            cd "$REMOTE_THEME_DIR"

            # Verify critical files exist
            echo "Verifying theme files..."
            MISSING_FILES=""
            for file in "style.css" "functions.php" "header.php" "footer.php" "assets/build/tailwind.css" "vendor/autoload.php"; do
              if [ ! -e "$file" ]; then
                MISSING_FILES="$MISSING_FILES $file"
              fi
            done

            if [ -n "$MISSING_FILES" ]; then
              echo "❌ Missing required files:"
              for f in $MISSING_FILES; do echo "  - $f"; done
              exit 1
            fi

            echo "✅ All required files present"

            # Check build directory
            echo ""
            echo "Checking built assets..."
            if [ -f "assets/build/tailwind.css" ]; then
              CSS_SIZE=$(du -h assets/build/tailwind.css 2>/dev/null | cut -f1 || echo "unknown")
              echo "  - Tailwind CSS size: $CSS_SIZE"
            fi

            # Clear WordPress object cache if wp-cli is available
            echo ""
            if command -v wp &> /dev/null; then
              echo "Clearing WordPress cache..."
              wp cache flush --path="$(dirname $(dirname $(dirname $PWD)))" 2>/dev/null || echo "⚠️  Cache flush skipped (wp-cli not available or wrong path)"
            else
              echo "⚠️  WP-CLI not found, skipping cache flush"
            fi

            # Log deployment
            echo ""
            echo "==================================="
            echo "✅ Deployment completed successfully!"
            echo "==================================="
            echo "Next steps:"
            echo "  1. Test the site: https://your-site.com"
            echo "  2. If Block Templates need syncing:"
            echo "     Go to WP Admin → Block Templates → Sync Tools"
            echo "     Click 'Import from Files'"

      - name: Deployment summary
        if: ${{ matrix.branch == github.ref_name && always() }}
        run: |
          echo "### 🚀 Deployment Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Environment:** ${{ matrix.environment_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ matrix.branch }}" >> $GITHUB_STEP_SUMMARY
          echo "**Commit:** \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Status:** ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### 📦 What was deployed:" >> $GITHUB_STEP_SUMMARY
          echo "- Built Gutenberg blocks" >> $GITHUB_STEP_SUMMARY
          echo "- Compiled Tailwind CSS" >> $GITHUB_STEP_SUMMARY
          echo "- Production Composer dependencies" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "#### ⚠️ Post-deployment:" >> $GITHUB_STEP_SUMMARY
          echo "If you edited Block Templates locally, remember to:" >> $GITHUB_STEP_SUMMARY
          echo "1. Go to **WP Admin → Block Templates → Sync Tools**" >> $GITHUB_STEP_SUMMARY
          echo "2. Click **Import from Files** to sync database content" >> $GITHUB_STEP_SUMMARY
